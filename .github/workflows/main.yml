name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: chmod +x mvnw && ./mvnw package

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u imre78 --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/imre78/cubix/1/homework/app:springboot .

      - name: Push Docker image
        run: docker push ghcr.io/Imre78/cubix/1/homework/app:springboot

  verify:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run verification
        run: chmod +x verify-image.sh && ./verify-image.sh
